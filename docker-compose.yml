services:
  vscode-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: ${CONTAINER_NAME:-vscode-dind}
    image: ${REGISTRY_IMAGE:-vscode-dind}:${TAG:-dev}

    volumes:
      # Docker socket 挂载（与宿主机 Docker daemon 通信）
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock

      # 持久化 coder 用户目录
      - user-dir:/home/coder

      # 项目目录挂载
      - workspace-dir:/workspace

      # SSH 密钥挂载（可选）
      # - ~/.ssh:/home/coder/.ssh:ro

    # 端口映射
    ports:
      # code-server web UI
      - "${CODE_SERVER_PORT:-8443}:8443"
      # SSH 访问
      - "${SSH_PORT:-2222}:22"

    # 环境变量
    environment:
      - DOCKER_TLS_VERIFY=${DOCKER_TLS_VERIFY:-0}
      - DIND_PASSWORD=${DIND_PASSWORD:-password}

    # 网络配置
    networks:
      - dev-network

    # 重启策略
    restart: unless-stopped

    # 资源限制（可选）
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 4G
    #     reservations:
    #       cpus: '1'
    #       memory: 2G

volumes:
  user-dir:
    driver: local

  workspace-dir:
    driver: local

networks:
  dev-network:
    driver: bridge
